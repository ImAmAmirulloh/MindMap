<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mind Map Creator</title>
  <link rel="stylesheet" href="style.css">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Konva -->
  <script src="https://unpkg.com/konva@9.3.6/konva.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="flex flex-col md:flex-row h-screen w-screen overflow-hidden bg-gray-50 text-gray-900 font-sans">
  <!-- Toolbar -->
  <div id="toolbar" class="flex flex-row md:flex-col gap-2 bg-white border-b md:border-b-0 md:border-r border-gray-200 p-2 w-full md:w-16 items-center shadow-sm z-10 overflow-x-auto shrink-0">
    <!-- Tools injected by JS -->
  </div>
  
  <!-- Canvas Area -->
  <div class="flex-1 relative min-h-0 bg-gray-100 flex items-center justify-center p-8 overflow-auto" id="canvas-wrapper">
    <div id="canvas-container" class="shadow-lg bg-white relative">
      <div id="comment-popup" class="absolute bg-yellow-100 p-3 rounded shadow-xl border border-yellow-300 z-50 max-w-xs pointer-events-none hidden">
        <p id="comment-text" class="text-sm text-gray-800 whitespace-pre-wrap"></p>
      </div>
      <!-- Text Editor Overlay -->
      <textarea id="text-editor" class="absolute hidden border border-gray-400 outline-none resize-both p-1" style="z-index: 100;"></textarea>
    </div>
  </div>

  <!-- Properties Panel -->
  <div id="properties-panel" class="w-full md:w-72 h-1/3 md:h-full max-h-[40vh] md:max-h-none bg-white border-t md:border-t-0 md:border-l border-gray-200 p-4 overflow-y-auto shadow-sm z-10 flex flex-col gap-6 shrink-0">
    <!-- Injected by JS -->
  </div>

  <script src="script.js"></script>
</body>
</html>
